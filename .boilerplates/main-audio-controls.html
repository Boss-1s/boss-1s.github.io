<div id="main-controls">
    <h3>Page-Wide Controls</h3>
    <button id="play-all">
        Play all songs on this page
    </button>
    &nbsp;
    <button id="play-next">
        Play next song
    </button>
    &nbsp;
    <button id="pause">
        Pause
    </button>
    &nbsp;
    <button id="resume">
        Resume Paused Songs
    </button>
    &nbsp;
    <label for="loop">Loop Songs</label>
    <input type="checkbox" name="loop" id="loop">
    &nbsp;
    <label for="shuffle">Shuffle Songs</label>
    <input type="checkbox" name="shuffle" id="shuffle">
</div>
